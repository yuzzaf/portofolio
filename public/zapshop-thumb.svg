<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="glowOrange">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f97316" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#fafaf9"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="100" r="200" fill="url(#orangeGrad)" opacity="0.05"/>
  <circle cx="1150" cy="700" r="250" fill="url(#orangeGrad)" opacity="0.04"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  
  <!-- Logo -->
  <g transform="translate(60, 28)">
    <circle cx="12" cy="12" r="12" fill="url(#orangeGrad)"/>
    <path d="M 8 8 L 16 8 L 14 16 L 10 16 Z" fill="white" font-weight="bold"/>
    <text x="12" y="15" font-size="12" font-weight="700" fill="white" text-anchor="middle" font-family="sans-serif">Z</text>
  </g>
  
  <text x="100" y="48" font-size="22" font-weight="700" fill="#1f2937" font-family="sans-serif">Zapshop</text>
  
  <!-- Search bar -->
  <rect x="420" y="22" width="300" height="44" rx="8" fill="#f3f1f0" stroke="#d6d3d1" stroke-width="1"/>
  <text x="435" y="48" font-size="14" fill="#a8a29e" font-family="sans-serif">Search products...</text>
  
  <!-- Cart icon -->
  <g transform="translate(1080, 30)">
    <path d="M 0 0 L 20 0 L 24 40 L -4 40 Z" fill="none" stroke="#f97316" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="4" cy="44" r="3" fill="#f97316"/>
    <circle cx="18" cy="44" r="3" fill="#f97316"/>
    <circle cx="12" cy="8" r="8" fill="#f97316" opacity="0.2"/>
    <text x="12" y="12" font-size="10" font-weight="700" fill="#f97316" text-anchor="middle">3</text>
  </g>
  
  <!-- Main content -->
  <g transform="translate(0, 100)">
    <!-- Left section -->
    <g transform="translate(100, 50)">
      <text x="0" y="0" font-size="14" font-weight="600" fill="#f97316" font-family="sans-serif">MEGA SALE - UP TO 50% OFF</text>
      
      <text x="0" y="50" font-size="56" font-weight="900" fill="#111827" font-family="serif">Shop the Best</text>
      <text x="0" y="110" font-size="56" font-weight="900" fill="#111827" font-family="serif">Products Today</text>
      
      <text x="0" y="170" font-size="16" fill="#6b7280" font-family="sans-serif">Discover thousands of high-quality products at</text>
      <text x="0" y="195" font-size="16" fill="#6b7280" font-family="sans-serif">unbeatable prices. Fast shipping & secure checkout.</text>
      
      <!-- CTA buttons -->
      <rect x="0" y="240" width="160" height="50" rx="10" fill="url(#orangeGrad)" filter="url(#glowOrange)"/>
      <text x="80" y="275" font-size="15" font-weight="600" fill="white" text-anchor="middle" font-family="sans-serif">Shop Now</text>
      
      <rect x="200" y="240" width="160" height="50" rx="10" fill="white" stroke="#f97316" stroke-width="2"/>
      <text x="280" y="275" font-size="15" font-weight="600" fill="#f97316" text-anchor="middle" font-family="sans-serif">View Catalog</text>
    </g>
    
    <!-- Right section - Product showcase -->
    <g transform="translate(580, 0)">
      <!-- Featured product card -->
      <rect x="0" y="0" width="480" height="380" rx="20" fill="white" stroke="#e7e5e4" stroke-width="1.5" filter="url(#shadow)"/>
      
      <!-- Product image area -->
      <rect x="0" y="0" width="480" height="240" rx="20" fill="url(#orangeGrad)" opacity="0.08"/>
      
      <!-- Product badge -->
      <rect x="20" y="20" width="70" height="32" rx="6" fill="url(#orangeGrad)"/>
      <text x="55" y="42" font-size="12" font-weight="700" fill="white" text-anchor="middle" font-family="sans-serif">-30%</text>
      
      <!-- Product item illustration (simple geometric shapes) -->
      <circle cx="240" cy="100" r="60" fill="url(#orangeGrad)" opacity="0.3"/>
      <rect x="200" y="60" width="80" height="80" rx="8" fill="url(#orangeGrad)" opacity="0.5"/>
      
      <!-- Product details -->
      <text x="240" y="290" font-size="18" font-weight="700" fill="#111827" text-anchor="middle" font-family="sans-serif">Premium Product</text>
      <text x="240" y="315" font-size="14" fill="#6b7280" text-anchor="middle" font-family="sans-serif">High quality, fast delivery</text>
      
      <!-- Rating -->
      <g transform="translate(240, 330)">
        <text x="-35" y="10" font-size="14" fill="#f97316" font-family="sans-serif">★★★★★</text>
        <text x="20" y="10" font-size="13" fill="#6b7280" font-family="sans-serif">(2.5k reviews)</text>
      </g>
      
      <!-- Price section -->
      <g transform="translate(240, 370)">
        <text x="-30" y="0" font-size="24" font-weight="700" fill="#111827" text-anchor="end" font-family="sans-serif">$79.99</text>
        <text x="-15" y="0" font-size="16" fill="#9ca3af" text-anchor="start" text-decoration="line-through" font-family="sans-serif">$99.99</text>
      </g>
    </g>
  </g>
  
  <!-- Feature pills at bottom -->
  <g transform="translate(100, 650)">
    <rect x="0" y="0" width="250" height="80" rx="12" fill="#fff7ed" border-radius="12"/>
    <circle cx="30" cy="30" r="18" fill="#fed7aa"/>
    <text x="30" y="35" font-size="20" text-anchor="middle">🚚</text>
    <text x="65" y="25" font-size="13" font-weight="600" fill="#111827" font-family="sans-serif">Free Shipping</text>
    <text x="65" y="45" font-size="12" fill="#6b7280" font-family="sans-serif">On orders over $50</text>
    
    <rect x="330" y="0" width="250" height="80" rx="12" fill="#fef2f2" border-radius="12"/>
    <circle cx="360" cy="30" r="18" fill="#fecaca"/>
    <text x="360" y="35" font-size="20" text-anchor="middle">🔒</text>
    <text x="395" y="25" font-size="13" font-weight="600" fill="#111827" font-family="sans-serif">Secure Payment</text>
    <text x="395" y="45" font-size="12" fill="#6b7280" font-family="sans-serif">SSL encrypted checkout</text>
    
    <rect x="660" y="0" width="250" height="80" rx="12" fill="#f0fdf4" border-radius="12"/>
    <circle cx="690" cy="30" r="18" fill="#bbf7d0"/>
    <text x="690" y="35" font-size="20" text-anchor="middle">↩️</text>
    <text x="725" y="25" font-size="13" font-weight="600" fill="#111827" font-family="sans-serif">Easy Returns</text>
    <text x="725" y="45" font-size="12" fill="#6b7280" font-family="sans-serif">30-day money back</text>
  </g>
</svg>